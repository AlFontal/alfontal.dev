name: framework-deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-framework:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: framework/package-lock.json

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies
        working-directory: framework
        run: npm ci

      - name: Build framework
        working-directory: framework
        run: npm run build

      - name: Deploy to site-html branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: framework/dist
          publish_branch: site-html
